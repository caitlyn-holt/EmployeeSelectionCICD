name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: './EmployeeSelection.sln'
  TEST_PROJECT_PATH: './EmployeeSelection.Tests/EmployeeSelection.Tests.csproj'
  UI_TEST_PROJECT_PATH: './EmployeeSelection.UITests/EmployeeSelection.UITests.csproj'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run Unit Tests with Coverage
      run: |
        dotnet test ${{ env.TEST_PROJECT_PATH }} `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory ./coverage `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          
    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: ./coverage/**/*Coverage.xml
        retention-days: 7

    - name: Publish Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/*.xml
        retention-days: 7

  static-analysis:
    name: Static Analysis
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build with Analyzers
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=false

    - name: Run Code Analysis
      run: |
        dotnet build ${{ env.SOLUTION_PATH }} `
          --configuration Release `
          /p:RunAnalyzers=true `
          /p:RunAnalyzersDuringBuild=true `
          /p:EnforceCodeStyleInBuild=true

  integration-tests:
    name: Integration Tests
    runs-on: windows-latest
    needs: [build-and-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run Integration Tests
      run: |
        dotnet test ${{ env.TEST_PROJECT_PATH }} `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --filter "Category=Integration"

  code-coverage-report:
    name: Code Coverage Report
    runs-on: windows-latest
    needs: [build-and-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Coverage Reports
      uses: actions/download-artifact@v4
      with:
        name: coverage-reports
        path: ./coverage

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        reportgenerator `
          -reports:"./coverage/**/*Coverage.xml" `
          -targetdir:"./coverage-report" `
          -reporttypes:"Html;Cobertura" `
          -assemblyfilters:"+EmployeeSelection.Core*" `
          -classfilters:"+EmployeeSelection.Core.Models.*;+EmployeeSelection.Core.Services.*;+EmployeeSelection.Core.Updaters.*"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-html
        path: ./coverage-report
        retention-days: 7

    - name: Check Coverage Threshold
      run: |
        # Здесь можно добавить проверку минимального покрытия
        # Например, с помощью PowerShell скрипта
        echo "Coverage report generated successfully"

  publish-reports:
    name: Publish Reports
    runs-on: windows-latest
    needs: [build-and-test, static-analysis, integration-tests, code-coverage-report]
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./artifacts/coverage-report-html

  deploy:
    name: Deploy to GitHub Pages
    runs-on: windows-latest
    needs: publish-reports
    if: github.ref == 'refs/heads/main'
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4