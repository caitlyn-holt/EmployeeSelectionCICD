name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: './EmployeeSelection.Core/EmployeeSelection.sln'
  TEST_PROJECT_PATH: './EmployeeSelection.Tests/EmployeeSelection.Tests.csproj'
  UI_TEST_PROJECT_PATH: './EmployeeSelection.UITests/EmployeeSelection.UITests.csproj'

jobs:
  # ===========================
  # СТАДИЯ 1: TEST
  # ===========================
  test:
    name: Test Stage
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    # Lint - проверка стиля кода
    - name: Run Linting (StyleCop)
      run: |
        dotnet build ${{ env.SOLUTION_PATH }} `
          --configuration Release `
          /p:RunAnalyzers=true `
          /p:RunAnalyzersDuringBuild=true `
          /p:EnforceCodeStyleInBuild=true `
          /p:TreatWarningsAsErrors=false
      continue-on-error: true

    # Static Analysis
    - name: Run Static Analysis
      run: |
        dotnet build ${{ env.SOLUTION_PATH }} `
          --configuration Release `
          /p:RunAnalyzers=true `
          /p:TreatWarningsAsErrors=false
      continue-on-error: true

    # Unit Tests with Coverage
    - name: Run Unit Tests with Coverage
      run: |
        dotnet test ${{ env.TEST_PROJECT_PATH }} `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory ./coverage `
          --logger "trx;LogFileName=test-results.trx" `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

    # Find and display coverage files
    - name: Find Coverage Files
      run: |
        Write-Host "Looking for coverage files..."
        Get-ChildItem -Recurse -Path ./coverage | Select-Object FullName
      shell: pwsh
      if: always()

    # Upload test results
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
        retention-days: 7
        if-no-files-found: warn

    # Upload coverage
    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          ./coverage/**/*.xml
          ./coverage/**/coverage.cobertura.xml
          ./coverage/**/coverage.opencover.xml
        retention-days: 7
        if-no-files-found: warn

  # ===========================
  # СТАДИЯ 2: INTEGRATION
  # ===========================
  integration:
    name: Integration Stage
    runs-on: windows-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run Integration Tests
      run: |
        dotnet test ${{ env.TEST_PROJECT_PATH }} `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --filter "FullyQualifiedName~IntegrationTests"
      continue-on-error: true

  # ===========================
  # СТАДИЯ 3: REPORT
  # ===========================
  report:
    name: Report Stage
    runs-on: windows-latest
    needs: [test, integration]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Coverage Reports
      uses: actions/download-artifact@v4
      with:
        name: coverage-reports
        path: ./coverage
      continue-on-error: true

    - name: List downloaded files
      run: |
        Write-Host "Downloaded files:"
        Get-ChildItem -Recurse -Path ./coverage | Select-Object FullName
      shell: pwsh

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        $coverageFiles = Get-ChildItem -Recurse -Path ./coverage -Filter "*.xml" -ErrorAction SilentlyContinue
        if ($coverageFiles.Count -gt 0) {
          reportgenerator `
            -reports:"./coverage/**/*.xml" `
            -targetdir:"./coverage-report" `
            -reporttypes:"Html;Cobertura" `
            -assemblyfilters:"+EmployeeSelection.Core*" `
            -classfilters:"+EmployeeSelection.Core.Models.*;+EmployeeSelection.Core.Services.*;+EmployeeSelection.Core.Updaters.*;+EmployeeSelection.Core.Validators.*;+EmployeeSelection.Core.Candidates.*"
          Write-Host "Coverage report generated successfully"
        } else {
          Write-Host "No coverage files found, skipping report generation"
          exit 0
        }
      shell: pwsh
      continue-on-error: true

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-html
        path: ./coverage-report
        retention-days: 7
        if-no-files-found: warn

    - name: Check Coverage Threshold
      run: |
        Write-Host "Coverage report generated successfully"
        Write-Host "Minimum coverage threshold: 70%"
        # Здесь можно добавить PowerShell скрипт для проверки покрытия

    - name: Publish Reports
      if: github.ref == 'refs/heads/main' && success()
      run: |
        Write-Host "Reports ready for publishing"
        Write-Host "Coverage report available in artifacts"